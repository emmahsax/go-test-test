name: Check Line Change in PR

on:
  pull_request:

env:
  description: version update
  file: main.go
  regex: ^\+.+fmt.Println\(.+\)

jobs:
  check_line_change:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Code
        uses: actions/checkout@v4
        with:
          fetch-depth: -1

      - name: Check line change
        id: line_change
        run: |
          changed_file="$(git diff ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} ${{ env.file }})"
          if [ -z "$changed_file" ]; then
            echo "line_changed=false" >> $GITHUB_OUTPUT
          else
            changed_line=$(echo "$changed_file" | grep -E '${{ env.regex }}')
            if [[ -n "$changed_line" ]]; then
              echo "line_changed=true" >> $GITHUB_OUTPUT
              echo "changes=$changed_line" >> $GITHUB_OUTPUT
            else
              echo "line_changed=false" >> $GITHUB_OUTPUT
            fi
          fi

      - if: steps.line_change.outputs.line_changed == 'true'
        name: Line Changed Comment
        uses: thollander/actions-comment-pull-request@v2
        with:
          comment_tag: line-changed2
          message: |
            :white_check_mark: Found ${{ env.description }} in `${{ env.file }}`:

            ```diff
            ${{ steps.line_change.outputs.changes }}
            ```

      - if: steps.line_change.outputs.line_changed == 'false'
        name: Line Not Changed Comment
        uses: thollander/actions-comment-pull-request@v2
        with:
          comment_tag: line-changed2
          message: |
            :warning: Could not find ${{ env.description }} in `${{ env.file }}`

      - run: |
          if [[ "${{ steps.line_change.outputs.line_changed }}" == 'false' ]]; then
            exit 1
          fi
